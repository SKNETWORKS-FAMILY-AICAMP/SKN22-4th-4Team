{% extends 'base.html' %}

{% block content %}
<div class="row mb-5 align-items-center">
    <div class="col-12">
        <h2 class="main-header mb-2 text-warning fw-bold"><i class="bi bi-calendar-check me-2"></i>실적 발표 캘린더</h2>
        <p class="text-secondary fs-5 mb-0">관심 기업(Watchlist) 대상 실적 일정 및 서프라이즈 분석</p>
    </div>
</div>

<div class="row mb-5">
    <!-- Controls Section -->
    <div class="col-12">
        <div class="premium-card">
            <div class="row align-items-end">
                <div class="col-md-3 mb-3 mb-md-0">
                    <label for="yearSelect" class="form-label text-secondary fw-semibold">연도</label>
                    <input type="number" class="form-control form-control-lg bg-main text-white border-secondary" id="yearSelect" value="2025" min="2020" max="2030">
                </div>
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label text-secondary fw-semibold">분기 선택</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="btnradio" id="q1" autocomplete="off" data-q="1" checked>
                        <label class="btn btn-outline-secondary" for="q1">1분기</label>

                        <input type="radio" class="btn-check" name="btnradio" id="q2" autocomplete="off" data-q="2">
                        <label class="btn btn-outline-secondary" for="q2">2분기</label>

                        <input type="radio" class="btn-check" name="btnradio" id="q3" autocomplete="off" data-q="3">
                        <label class="btn btn-outline-secondary" for="q3">3분기</label>

                        <input type="radio" class="btn-check" name="btnradio" id="q4" autocomplete="off" data-q="4">
                        <label class="btn btn-outline-secondary" for="q4">4분기</label>
                    </div>
                </div>
                 <div class="col-md-3">
                    <button id="fetch-btn" class="btn btn-premium w-100 py-2 fw-bold d-flex align-items-center justify-content-center h-100" style="min-height: 48px;">
                        <i class="bi bi-search me-2"></i> 일정 조회
                    </button>
                </div>
            </div>
            
            <div class="mt-3 pt-3 border-top border-secondary opacity-75">
                 <div class="d-flex align-items-center text-muted small">
                    <i class="bi bi-info-circle me-2"></i> 관심 기업(Watchlist)에 등록된 종목의 일정만 조회가 가능합니다.
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Results Area -->
<div class="row">
    <div class="col-12">
        <div id="loader" class="loader-container text-light" style="display: none;">
            <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h5 id="loading-text">실적 데이터를 조회하고 있습니다...</h5>
        </div>

        <div id="results-container">
            <!-- Data will be populated here by JS -->
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const d = new Date();
        const y = d.getFullYear();
        const m = d.getMonth() + 1;
        const q = Math.floor((m - 1) / 3) + 1;
        
        document.getElementById('yearSelect').value = y;
        
        // Setup Quarter buttons
        let selectedQuarter = q;
        const qBtns = document.querySelectorAll('.btn-check');
        
        // Initialize default active
        qBtns.forEach(btn => {
            if (parseInt(btn.getAttribute('data-q')) === selectedQuarter) {
                btn.checked = true;
            }
            
            btn.addEventListener('change', function() {
                if (this.checked) {
                    selectedQuarter = parseInt(this.getAttribute('data-q'));
                }
            });
        });

        // Setup Fetch Button
        document.getElementById('fetch-btn').addEventListener('click', fetchEarningsData);

        async function fetchEarningsData() {
            const year = document.getElementById('yearSelect').value;
            const loader = document.getElementById('loader');
            const resultsContainer = document.getElementById('results-container');
            const fetchBtn = document.getElementById('fetch-btn');
            
            // UI setup for loading
            fetchBtn.disabled = true;
            resultsContainer.innerHTML = '';
            loader.style.display = 'flex';
            
            try {
                const response = await fetch('/api/calendar/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ year: year, quarter: selectedQuarter })
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Server error occurred while fetching data');
                }
                
                renderResults(data);
                
            } catch (error) {
                console.error("Fetch Error: ", error);
                resultsContainer.innerHTML = `
                    <div class="alert bg-main border-danger text-danger d-flex align-items-center p-4 rounded-4">
                        <i class="bi bi-exclamation-triangle-fill display-6 me-4 opacity-75"></i>
                        <div>
                            <h5 class="text-danger mb-1">조회 실패</h5>
                            <span class="text-secondary">${error.message}</span>
                            <div class="mt-2 small text-muted">
                                <i class="bi bi-lightbulb me-1"></i> 사이드바 <strong>관심 기업(Watchlist)</strong>에 등록된 종목만 조회됩니다. 관심 기업이 등록되어 있는지 확인해 주세요.
                            </div>
                        </div>
                    </div>
                `;
            } finally {
                loader.style.display = 'none';
                fetchBtn.disabled = false;
            }
        }

        function renderResults(data) {
            const container = document.getElementById('results-container');
            
            if (!data.data || data.data.length === 0) {
                container.innerHTML = `
                    <div class="alert bg-main border-warning border text-muted d-flex align-items-center p-4 rounded-4">
                        <i class="bi bi-calendar-x display-6 me-4 text-warning opacity-75"></i>
                        <div>
                            <h5 class="text-white mb-1">실적 일정을 찾을 수 없습니다</h5>
                            <span>선택한 기간(<strong>${data.start_date} ~ ${data.end_date}</strong>)에 해당하는 실적 발표 일정이 없습니다.</span>
                            <div class="mt-2 small text-muted">
                                <i class="bi bi-lightbulb me-1"></i> 사이드바 <strong>관심 기업(Watchlist)</strong>에 등록된 종목(${data.watchlist_count || 0}개)만 조회됩니다.<br>
                                관심 기업을 추가하거나, 다른 분기를 선택해 보세요.
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            // Generate success header
            const headerHtml = `
                <div class="alert bg-main border-success border opacity-75 text-success d-flex align-items-center mb-4 rounded-4">
                    <i class="bi bi-check-circle-fill fs-4 me-3"></i> 
                    <span><strong>총 ${data.data.length}건</strong>의 실적 일정이 검색되었습니다.</span>
                </div>
            `;
            
            // Group data by date
            const groupedData = {};
            data.data.forEach(item => {
                if (!groupedData[item.date]) {
                    groupedData[item.date] = [];
                }
                groupedData[item.date].push(item);
            });
            
            let htmlList = '';
            
            // Sort dates
            const sortedDates = Object.keys(groupedData).sort();
            
            sortedDates.forEach((date, i) => {
                const items = groupedData[date];
                const collapseId = `collapse-date-${i}`;
                
                let rows = items.map(r => `
                    <tr>
                        <td class="fw-bold text-white"><span class="badge border border-secondary text-light bg-dark me-2 px-2 py-1">${r.ticker}</span></td>
                        <td class="text-secondary">${r.eps_estimate}</td>
                        <td class="text-white">${r.eps_actual}</td>
                        <td>${parseFloat(r.surprise) > 0 ? `<span class="badge badge-green">▲ ${r.surprise}</span>` : (parseFloat(r.surprise) < 0 ? `<span class="badge badge-red">▼ ${r.surprise}</span>` : `<span class="text-muted">${r.surprise}</span>`)}</td>
                    </tr>
                `).join('');
                
                htmlList += `
                    <div class="premium-card mb-4 p-0 overflow-hidden">
                        <div class="p-3 bg-surface border-bottom d-flex justify-content-between align-items-center text-white fw-bold" style="cursor: pointer; border-color: var(--border-color) !important;" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <span class="fs-5"><i class="bi bi-calendar-event me-2 text-warning"></i> ${date}</span>
                            <i class="bi bi-chevron-down text-muted"></i>
                        </div>
                        <div id="${collapseId}" class="collapse show">
                            <div class="p-0">
                                <div class="table-responsive">
                                    <table class="table table-premium table-hover mb-0">
                                        <thead>
                                            <tr>
                                                <th>티커 (Ticker)</th>
                                                <th>EPS 예상 (Estimate)</th>
                                                <th>EPS 실제 (Actual)</th>
                                                <th>서프라이즈 (%)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${rows}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = headerHtml + htmlList;
        }
    });
</script>
{% endblock %}
