{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="premium-card p-5" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill display-4 text-primary-accent mb-3 d-block"></i>
            <h2 class="text-white fw-bold">회원가입</h2>
            <p class="text-secondary mt-2">AI Finance에 오신 것을 환영합니다.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label text-light fw-semibold">{{ field.label }}</label>
                    <div class="input-group">
                        {{ field }}
                    </div>
                    {% if field.help_text %}
                        <div class="form-text text-secondary small mt-1">{{ field.help_text|safe }}</div>
                    {% endif %}
                    {% for error in field.errors %}
                        <div class="text-danger small mt-1">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-premium btn-lg fw-bold">가입하기</button>
            </div>
            
            <div class="text-center mt-4">
                <span class="text-muted">이미 계정이 있으신가요?</span>
                <a href="{% url 'login' %}" class="text-primary-accent text-decoration-none ms-2 fw-semibold">로그인</a>
            </div>
        </form>
    </div>
</div>

<style>
/* 폼 입력창 스타일링 오버라이드 (Premium Dark 테마 연동) */
.premium-card input, .premium-card select {
    background-color: var(--bg-main) !important;
    color: var(--text-primary) !important;
    border: 1px solid var(--border-color) !important;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    width: 100%;
}
.premium-card input:focus {
    box-shadow: var(--shadow-glow-blue) !important;
    border-color: var(--accent-blue) !important;
    outline: none;
}
/* Django Form Help Text Styling */
.helptext {
    list-style: none;
    padding-left: 0;
    margin-bottom: 0;
    margin-top: 0.5rem;
}
.helptext li {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-bottom: 0.25rem;
}
.helptext li::before {
    content: "•";
    color: var(--accent-blue);
    display: inline-block;
    width: 1em;
    margin-left: -1em;
}
</style>
{% endblock %}
